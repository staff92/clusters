apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 1h
  path: ./clusters/infrastructure/prod
  prune: true 
  sourceRef:
    kind: GitRepository
    name: flux-system 
  timeout: 2m
#! Add after bootstrap external secret
  postBuild:
      substituteFrom:
        - kind: Secret
          name: cluster-config-secrets