apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kube-system
resources:
  - secret.yaml
  - repo.yaml
  # - redis-pvc.yaml
  - releases.yaml
  - juicefs-sc.yaml
  # - test.yaml
configMapGenerator:
  - name: juicefs-values
    files:
      - juicefs-values.yaml
  - name: redis-values
    files:
      - redis-values.yaml
generatorOptions:
  disableNameSuffixHash: true