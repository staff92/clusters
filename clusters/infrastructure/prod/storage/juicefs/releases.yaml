---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: juicefs
spec:
  interval: 5m
  chart:
    spec:
      chart: juicefs-csi-driver
      version: '0.31.3'
      sourceRef:
        kind: HelmRepository
        name: juicefs
  valuesFrom:
    - kind: ConfigMap
      name: juicefs-values
      valuesKey: juicefs-values.yaml
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
spec:
  interval: 5m
  chart:
    spec:
      chart: redis
      version: '2.1.0'
      sourceRef:
        kind: HelmRepository
        name: redis
  valuesFrom:
    - kind: ConfigMap
      name: redis-values
      valuesKey: redis-values.yaml
