---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: local-storage
  namespace: local-storage
spec:
  interval: 5m
  chart:
    spec:
      chart: openebs
      version: '4.5.1'
      sourceRef:
        kind: HelmRepository
        name: openebs
        namespace: local-storage
  valuesFrom:
    - kind: ConfigMap
      name: local-storage-values
      valuesKey: values.yaml
