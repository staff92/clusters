---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authelia
spec:
  interval: 5m
  chart:
    spec:
      chart: authelia
      version: '0.11.6'
      sourceRef:
        kind: HelmRepository
        name: authelia
  valuesFrom:
    - kind: ConfigMap
      name: authelia-values
      valuesKey: authelia-values.yaml
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
spec:
  interval: 5m
  chart:
    spec:
      chart: redis
      version: '2.1.0'
      sourceRef:
        kind: HelmRepository
        name: redis
  valuesFrom:
    - kind: ConfigMap
      name: redis-values
      valuesKey: redis-values.yaml
