apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: authelia
resources:
  - namespace.yaml
  - repo.yaml
  - release.yaml
  - secret.yaml
  # - middleware.yaml
  # - oidc-vault.yaml
configMapGenerator:
  - name: authelia-values
    files:
      - authelia-values.yaml
  - name: redis-values
    files:
      - redis-values.yaml
generatorOptions:
  disableNameSuffixHash: true