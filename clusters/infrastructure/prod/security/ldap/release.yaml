---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: lldap
spec:
  interval: 5m
  chart:
    spec:
      chart: lldap
      version: '0.6.3'
      sourceRef:
        kind: HelmRepository
        name: lldap
  valuesFrom:
    - kind: ConfigMap
      name: lldap-values
      valuesKey: values.yaml
