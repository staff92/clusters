---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatus
spec:
  interval: 5m
  chart:
    spec:
      chart: gatus
      version: '1.5.0'
      sourceRef:
        kind: HelmRepository
        name: gatus
        namespace: gatus
  valuesFrom:
    - kind: ConfigMap
      name: gatus-values
      valuesKey: values.yaml
