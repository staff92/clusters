clusterName: "Default"

globalConfig:
  check_prometheus_flags: false
  account_id: ""
  signing_key: ""

# Sink email
sinksConfig:
  - mail_sink:
      name: email_alert
      # mailto: "mailtos://${LDAP_USER1_EMAIL}"
      # from: "noreply@${CLUSTER_DOMAIN}"
      # smtp_host: "mail.mail"
      # smtp_port: 587
      #mailto: "mailto://mail.mail:587?from=noreply@${CLUSTER_DOMAIN}&to=${LDAP_USER1_EMAIL}"
      mailto: "mailto://test:test@maildev-smtp.maildev:1025?from=noreply@${CLUSTER_DOMAIN}&to=${LDAP_USER1_EMAIL}"
      throttleSeconds: 3600

    # name: ses_mail_sink
    # mailto: "mailtos://alerts@company.com"  # Recipient addresses
    # use_ses: true
    # aws_region: "us-east-1"
    # from_email: "robusta-alerts@company.com"
    # with_header: true  # optional

enablePrometheusStack: false
enableHolmesGPT: false
enablePlatformPlaybooks: false

#! media,authelia,traefik
# Désactiver les ressources bruyantes dans kubewatch
kubewatch:
  config:
    namespace: ""   #! ALL
    resource:
      deployment: false
      pod: true
      replicaset: false      
      daemonset: false
      statefulset: false
      services: false
      job: false
      node: false
      hpa: false
      clusterrole: false
      clusterrolebinding: false
      serviceaccount: false
      persistentvolume: false
      namespace: false
      configmap: false
      secret: false
      event: false            # SPAM absolu, toujours désactiver
      coreevent: false
      ingress: false

