# Désactiver tous les builtins (ils n'ont pas de rate_limit et envoient partout)
builtinPlaybooks: 
  #playbooks for non-prometheus based monitoring
  - name: "CrashLoopBackOff"
    triggers:
    - on_pod_crash_loop:
        restart_reason: "CrashLoopBackOff"
    actions:
    - report_crash_loop: {}
    sinks:
      - email_alert

  - name: "ImagePullBackOff"
    triggers:
    - on_image_pull_backoff: {}
    actions:
    - image_pull_backoff_reporter: {}
    sinks:
      - email_alert

  - name: "PodEvicted"
    triggers:
    - on_pod_evicted: {}
    actions:
    - pod_evicted_enricher: {}
    - pod_events_enricher: {}
    - enrich_pod_with_node_events: {}
    sinks:
      - email_alert

  - name: "PodOOMKill"
    triggers:
    - on_pod_oom_killed:
        rate_limit: 3600
    actions:
    - pod_oom_killer_enricher:
        attach_logs: true
        container_memory_graph: true
        node_memory_graph: true
        dmesg_log: false
    stop: true
    sinks:
      - email_alert

runner:
  sendAdditionalTelemetry: false
