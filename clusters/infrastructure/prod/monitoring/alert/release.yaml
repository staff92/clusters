---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alert
spec:
  interval: 5m
  chart:
    spec:
      chart: robusta
      version: '0.37.0'
      sourceRef:
        kind: HelmRepository
        name: alert
        namespace: alert
  valuesFrom:
    - kind: ConfigMap
      name: alert-values
      valuesKey: values.yaml
