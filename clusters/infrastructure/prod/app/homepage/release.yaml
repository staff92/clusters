---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
spec:
  interval: 5m
  chart:
    spec:
      chart: homepage
      version: '2.1.0'
      sourceRef:
        kind: HelmRepository
        name: homepage
  valuesFrom:
    - kind: ConfigMap
      name: homepage-values
      valuesKey: values.yaml
