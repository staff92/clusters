---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: semaphore
spec:
  interval: 5m
  chart:
    spec:
      chart: semaphore
      version: '16.2.2'
      sourceRef:
        kind: HelmRepository
        name: semaphore
  valuesFrom:
    - kind: ConfigMap
      name: semaphore-values
      valuesKey: values.yaml