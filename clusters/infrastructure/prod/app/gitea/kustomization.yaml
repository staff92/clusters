apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: gitea
resources:
  - namespace.yaml
  - repo.yaml
  - pvc.yaml
  - secret.yaml
  - release.yaml
  - ingress-ssh.yaml
configMapGenerator:
  - name: gitea-values
    files:
      - gitea-values.yaml
  - name: runner-values
    files:
      - runner-values.yaml
generatorOptions:
  disableNameSuffixHash: true