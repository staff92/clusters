---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitea
spec:
  interval: 5m
  chart:
    spec:
      chart: gitea
      version: '12.6.0'
      sourceRef:
        kind: HelmRepository
        name: gitea
  valuesFrom:
    - kind: ConfigMap
      name: gitea-values
      valuesKey: gitea-values.yaml
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: runner
spec:
  interval: 5m
  chart:
    spec:
      chart: actions
      version: '0.1.1'
      sourceRef:
        kind: HelmRepository
        name: gitea
  valuesFrom:
    - kind: ConfigMap
      name: runner-values
      valuesKey: runner-values.yaml
