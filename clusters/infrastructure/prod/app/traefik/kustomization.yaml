apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: traefik
resources:
  - namespace.yaml
  - repo.yaml
  #! If first setup => remove middleware (umami not ready)
  #! need for antibot
  # - middleware.yaml
  - release.yaml
configMapGenerator:
  - name: traefik-values
    files:
      - values.yaml
generatorOptions:
  disableNameSuffixHash: true