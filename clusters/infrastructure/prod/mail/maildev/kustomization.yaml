apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: maildev
resources:
  - namespace.yaml
  - secret.yaml
  - repo.yaml
  - rules-cm.yaml
  - release.yaml
configMapGenerator:
  - name: maildev-values
    files:
      - values.yaml
generatorOptions:
  disableNameSuffixHash: true