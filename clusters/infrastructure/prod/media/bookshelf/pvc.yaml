apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bookshelf-config
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: openebs-hostpath

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bookshelf-books
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 25Gi
  storageClassName: openebs-hostpath
