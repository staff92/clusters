#! https://github.com/sftpgo/helm-chart/tree/main/sftpgo
#! oci://ghcr.io/sftpgo/helm-charts/sftpgo
#! docker pull ghcr.io/sftpgo/helm-charts/sftpgo:0.44.0
#! helm install sftpgo --wait oci://ghcr.io/sftpgo/helm-charts/sftpgo
#! helm upgrade sftpgo --wait oci://ghcr.io/sftpgo/helm-charts/sftpgo -f clusters/infrastructure/prod/sftpgo/values.yaml

# Default values for sftpgo.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# -- Number of replicas (pods) to launch.
replicaCount: 1

# -- Number of old ReplicaSets to retain to allow rollback.
revisionHistoryLimit: 10

# -- Define the [strategy](https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#strategy) to replace old Pods by new ones during updates.
deploymentStrategy: {}

image:
  # -- Name of the image repository to pull the container image from.
  repository: ghcr.io/drakkan/sftpgo

  # -- [Image pull policy](https://kubernetes.io/docs/concepts/containers/images/#updating-images) for updating already existing images on a node.
  pullPolicy: IfNotPresent

  # -- Image tag override for the default value (chart appVersion).
  tag: ""

# -- Reference to one or more secrets to be used when [pulling images](https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/#create-a-pod-that-uses-your-secret) (from private registries).
imagePullSecrets: []

# -- A name in place of the chart name for `app:` labels.
nameOverride: ""

# -- A name to substitute for the full names of resources.
fullnameOverride: ""

sftpd:
  # -- Enable SFTP service.
  enabled: true

  # -- Container SFTP port. Set to 0 to disable the service. The 'enabled' flag may be removed in the future in favor of this setting.
  port: 2022

ftpd:
  # -- Enable FTP service.
  enabled: false

  # -- Container FTP port. Set to 0 to disable the service. The 'enabled' flag may be removed in the future in favor of this setting.
  port: 2021

webdavd:
  # -- Enable WebDAV service.
  enabled: false

  # -- Container WebDAV port. Set to 0 to disable the service. The 'enabled' flag may be removed in the future in favor of this setting.
  port: 8081

httpd:
  # -- Enable HTTP service.
  enabled: true

  # -- Container HTTP port. Set to 0 to disable the service. The 'enabled' flag may be removed in the future in favor of this setting.
  port: 8080

# -- Application configuration.
# See the [official documentation](https://docs.sftpgo.com/latest/config-file/).
config:
  sftpd: 
    password_authentication: false  
  # https:
  #   bindings:
  #     - enable_web_admin: true
  #       enable_web_client: true
  data_provider:
    users_base_dir: "/srv/sftpgo/sftpgo/data"
    create_default_admin: true
  # httpd:
  #   enable_web_client: false
  #   enable_web_admin: false  

# -- Additional storage [volumes](https://kubernetes.io/docs/concepts/storage/volumes/).
# See the [API reference](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#volumes-1) for details.
volumes: 
  - name: plugin-volume
    emptyDir: {}
  - name: jellyfin-media
    persistentVolumeClaim:
      claimName: "servarr-jellyfin-media"

# -- Additional [volume mounts](https://kubernetes.io/docs/tasks/configure-pod-container/configure-volume-storage/).
# See the [API reference](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#volumes-1) for details.
volumeMounts:
  - name: plugin-volume
    mountPath: /tmp
  - name: jellyfin-media
    mountPath: /srv/sftpgo/sftpgo/data
    #mountPath: /srv/sftpgo/data
# -- Additional environment variables mounted from [secrets](https://kubernetes.io/docs/concepts/configuration/secret/#using-secrets-as-environment-variables) or [config maps](https://kubernetes.io/docs/tasks/configure-pod-container/configure-pod-configmap/#configure-all-key-value-pairs-in-a-configmap-as-container-environment-variables).
# See the [API reference](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#environment-variables) for details.
envFrom: []

# -- Additional environment variables passed directly to containers.
# See the [API reference](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#environment-variables) for details.
envVars:
  - name: SFTPGO_DEFAULT_ADMIN_USERNAME
    value: "admin"
  - name: SFTPGO_DEFAULT_ADMIN_PASSWORD
    valueFrom:
      secretKeyRef:
        name: sftp-credentials
        key: SFTPGO_DEFAULT_ADMIN_PASSWORD
  - name: SFTPGO_PLUGIN_AUTH_LDAP_URL
    value: ldap://lldap-ldap.lldap.svc.cluster.local:3890
  - name: SFTPGO_PLUGIN_AUTH_LDAP_BASE_DN
    value: "ou=people,dc=example,dc=com"
  - name: SFTPGO_PLUGIN_AUTH_LDAP_BIND_DN
    value: "uid=admin,ou=people,dc=example,dc=com"
  - name: SFTPGO_PLUGIN_AUTH_LDAP_PASSWORD
    valueFrom:
      secretKeyRef:
        name: sftp-credentials
        key: SFTPGO_PLUGIN_AUTH_LDAP_PASSWORD
  - name: SFTPGO_PLUGIN_AUTH_LDAP_SEARCH_QUERY
    value: "(&(objectClass=inetOrgPerson)(user_id=%username%))"
  - name: SFTPGO_PLUGINS__0__TYPE
    value: auth
  - name: SFTPGO_PLUGINS__0__AUTH_OPTIONS__SCOPE
    value: "5"
  - name: SFTPGO_PLUGINS__0__CMD
    value: "/tmp/sftpgo-plugin-auth"
  - name: SFTPGO_PLUGINS__0__ARGS
    value: serve
  - name: SFTPGO_PLUGINS__0__AUTO_MTLS
    value: "1"
  - name: SFTPGO_PLUGIN_AUTH_REQUIRE_GROUPS
    value: "true"
  - name: SFTPGO_PLUGIN_AUTH_MEMBERSHIP_GROUP_PREFIX
    value: "jelly_admin"
  # - name: SFTPGO_PLUGIN_AUTH_PRIMARY_GROUP_PREFIX
  #   value: "Ttest "
  # - name: SFTPGO_PLUGIN_AUTH_SECONDARY_GROUP_PREFIX
  #   value: "test-users"

#envVars: []
  # - name: SOME_ENV_VAR
  #   value: SOME_VALUE
  # - name: SOME_ENV_VAR2
  #   valueFrom:
  #     secretKeyRef:
  #       name: SOME_SECRET_NAME
  #       key: SOME_SECRET_KEY
  # - name: SOME_ENV_VAR3
  #   valueFrom:
  #     configMapKeyRef:
  #       name: SOME_CONFIGMAP_NAME
  #       key: SOME_CONFIGMAP_KEY


# -- Additional environment variables passed directly to containers using a simplified key-value syntax.
env: {}
  # SFTPGO_DEFAULT_ADMIN_USERNAME: "admin"
  # SFTPGO_DEFAULT_ADMIN_PASSWORD: "admin"
  # SOME_ENV_VAR: SOME_VALUE

serviceAccount:
  # -- Enable service account creation.
  create: true

  # -- Automount API credentials for the Service Account.
  automountServiceAccountToken: true

  # -- Annotations to be added to the service account.
  annotations: {}

  # -- The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

# -- Annotations to be added to deployment.
deploymentAnnotations: {}

# -- Labels to be added to deployment.
deploymentLabels: {}

# -- Annotations to be added to pods.
podAnnotations: {}

# -- Labels to be added to pods.
podLabels: {}

# -- Pod priority class name.
podPriorityClassName:

# -- Duration in seconds the pod needs to terminate gracefully.
# See the [API reference](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#lifecycle) for details.
# Should be set in conjunction with SFTPGO_GRACE_TIME environment variable.
# Expected value: number of seconds (int64).
podTerminationGracePeriodSeconds: null

# -- Pod [security context](https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-pod).
# See the [API reference](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#security-context) for details.
podSecurityContext:
  fsGroup: 1000

# -- Container [security context](https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-container).
# See the [API reference](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#security-context-1) for details.
securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true

# -- Add [init containers](https://kubernetes.io/docs/concepts/workloads/pods/init-containers/) to the pod.
# initContainers: []
initContainers:
  - name: plugin-downloader
    image: curlimages/curl:latest
    #image: curlimages/curl:latest
    command:
      - /bin/sh
      - -c
      - |
        curl -L -o /tmp/sftpgo-plugin-auth "https://github.com/sftpgo/sftpgo-plugin-auth/releases/download/v1.0.14/sftpgo-plugin-auth-linux-amd64"
        chmod 777 /tmp/sftpgo-plugin-auth
    volumeMounts:
      - name: plugin-volume
        mountPath: /tmp


# -- Additional [containers](https://kubernetes.io/docs/concepts/workloads/pods/#how-pods-manage-multiple-containers) to run in the same pod (e.g., sidecars).
# See the [API reference](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#containers) for details.
extraContainers: []

service:
  # -- Annotations to be added to the service.
  annotations: {}

  # -- labels to be added to the service.
  labels: {}

  # -- Kubernetes [service type](https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types).
  type: ClusterIP

  # -- (string) Only applies when the service type is LoadBalancer. Load balancer will get created with the IP specified in this field.
  loadBalancerIP: ''

  # -- (list) If specified (and supported by the cloud provider), traffic through the load balancer will be restricted to the specified client IPs.
  # Valid values are IP CIDR blocks.
  loadBalancerSourceRanges: []

  ports:
    sftp:
      # -- SFTP service port.
      port: 22

      # -- (int) SFTP node port (when applicable).
      nodePort: 30022

    ftp:
      # -- FTP service port.
      port: 21

      # -- (int) FTP node port (when applicable).
      nodePort:

      passiveRange:
        # -- FTP passive range start port.
        start: 50000

        # -- FTP passive range end port.
        end: 50020

    webdav:
      # -- WebDAV service port.
      port: 81

      # -- (int) WebDAV node port (when applicable).
      nodePort:

    http:
      # -- REST API service port.
      port: 80

      # -- (int) REST API node port (when applicable).
      nodePort:

  # -- Route external traffic to node-local or cluster-wide endoints.
  # Useful for [preserving the client source IP](https://kubernetes.io/docs/tasks/access-application-cluster/create-external-load-balancer/#preserving-the-client-source-ip).
  externalTrafficPolicy:

  # --  Enable client IP based session affinity. [More info](https://kubernetes.io/docs/concepts/services-networking/service/#virtual-ips-and-service-proxies)
  sessionAffinity:

# -- Additional services exposing servers (SFTP, FTP, WebDAV, HTTP) individually.
# The schema matches the one under the `service` key. Additional services need at least one port.
services: 
  public:
    annotations: {}
    type: NodePort
    ports:
      sftp: # Only SFTP will be exposed
        port: 22
        nodePort: 30022

# -- Additional ports to expose in the deployment and service.
additionalPorts: {}
  # custom-sftp:
  #   port: 2222           # Service port
  #   containerPort: 22    # Pod port

ui:
  ingress:
    # -- Enable [ingress](https://kubernetes.io/docs/concepts/services-networking/ingress/).
    enabled: true

    # -- Ingress [class name](https://kubernetes.io/docs/concepts/services-networking/ingress/#ingress-class).
    className: "traefik"

    # -- Annotations to be added to the ingress.
    annotations:
      #traefik.ingress.kubernetes.io/router.middlewares: authelia-forwardauth-authelia@kubernetescrd
      gethomepage.dev/enabled: "true"
      gethomepage.dev/name: "sftpgo"
      gethomepage.dev/description: "Full-featured and highly configurable event-driven file transfer solution."
      gethomepage.dev/group: "Infrastructure"
      gethomepage.dev/icon: "sftpgo.png"
      gethomepage.dev/pod-selector: "app.kubernetes.io/name=sftpgo"
      # kubernetes.io/ingress.class: nginx
      # kubernetes.io/tls-acme: "true"

    # -- Ingress host configuration.
    # @default -- See [values.yaml](values.yaml).
    hosts:
      - host: sftp.${CLUSTER_DOMAIN}
        # Change httpd.web_root in the sftpgo configuration if you change the path
        paths:
          - path: /
            pathType: ImplementationSpecific

    # -- Ingress TLS configuration.
    # @default -- See [values.yaml](values.yaml).
    tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local

api:
  ingress:
    # -- Enable [ingress](https://kubernetes.io/docs/concepts/services-networking/ingress/).
    enabled: false

    # -- Ingress [class name](https://kubernetes.io/docs/concepts/services-networking/ingress/#ingress-class).
    className: ""

    # -- Annotations to be added to the ingress.
    annotations: {}
      # nginx.ingress.kubernetes.io/rewrite-target: /$1
      # kubernetes.io/ingress.class: nginx
      # kubernetes.io/tls-acme: "true"

    # -- Ingress host configuration.
    # @default -- See [values.yaml](values.yaml).
    hosts:
      - host: chart-example.local
        # SFTPGo does not change the path for the API endpoint if httpd.web_root is set. So, we need to rewrite to the root path.
        paths:
          - path: /api/(.*)
            pathType: ImplementationSpecific

    # -- Ingress TLS configuration.
    # @default -- See [values.yaml](values.yaml).
    tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local

# -- Container resource [requests and limits](https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/).
# See the [API reference](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#resources) for details.
# @default -- No requests or limits.
resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# -- Autoscaling configuration (see [values.yaml](values.yaml) for details).
# @default -- Disabled by default.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
  # - type: Resource
  #   resource:
  #     name: cpu
  #     target:
  #       type: Utilization
  #       averageUtilization: 80
  # - type: Pods
  #   pods:
  #     metric:
  #       name: packets-per-second
  #     target:
  #       type: AverageValue
  #       averageValue: 1k
  # - type: Object
  #   object:
  #     metric:
  #       name: requests-per-second
  #    describedObject:
  #       apiVersion: networking.k8s.io/v1
  #       kind: Ingress
  #       name: main-route
  #     target:
  #       type: Value
  #       value: 10k

# -- [Pod Disruption Budget](https://kubernetes.io/docs/concepts/workloads/pods/disruptions/) configuration.
# See the [API reference](https://kubernetes.io/docs/reference/kubernetes-api/policy-resources/pod-disruption-budget-v1/) for details.
# Note: minAvailable and maxUnavailable cannot be used simultaneously.
pdb:
  # -- Enable Pod Disruption Budget creation.
  enabled: false
  # minAvailable: 1
  # maxUnavailable: 1

# -- [Node selector](https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#nodeselector) configuration.
nodeSelector: {}

# -- [Tolerations](https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/) for node taints.
# See the [API reference](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#scheduling) for details.
tolerations: []

# -- [Affinity](https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#affinity-and-anti-affinity) configuration.
# See the [API reference](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#scheduling) for details.
affinity: {}

# -- Run pods in the host network of nodes.
# Warning: The use of host network is [discouraged](https://kubernetes.io/docs/concepts/configuration/overview/#services). Make sure to use it only when absolutely necessary.
hostNetwork: false

# -- [Network Policies](https://kubernetes.io/docs/concepts/services-networking/network-policies/) configuration.
networkPolicy:
  # -- Enable creation of NetworkPolicy resources.
  enabled: false
  # -- Specifies the policy types. Defaults to Ingress and Egress if not specified.
  policyTypes: []
  # -- Ingress rules.
  ingress: []
  # -- Egress rules.
  egress: []

# -- [Topology Spread Constraints](https://kubernetes.io/docs/concepts/workloads/pods/pod-topology-spread-constraints/) configuration.
# Accepts a list of constraints. The legacy object format is also supported for backward compatibility.
topologySpreadConstraints: []
  # - maxSkew: 1
  #   topologyKey: topology.kubernetes.io/zone
  #   whenUnsatisfiable: DoNotSchedule
  #   matchLabelKeys:
  #     - pod-template-hash

persistence:
  enabled: false
