# ---
# # # ============================================================
# # # NAMESPACE
# # # ============================================================
# # apiVersion: v1
# # kind: Namespace
# # metadata:
# #   name: streamystats

---
# ============================================================
# SECRET - Variables sensibles
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: streamystats-secrets
  namespace: media
type: Opaque
stringData:
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "changeme"
  POSTGRES_DB: "streamystats"
  SESSION_SECRET: "changeme-session-secret-very-long"
  NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: "changeme-encryption-key-32chars"

---
# ============================================================
# CONFIGMAP - Variables non sensibles
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: streamystats-config
  namespace: media
data:
  NODE_ENV: "production"
  PORT: "3005"
  HOST: "0.0.0.0"
  HOSTNAME: "0.0.0.0"
  SESSION_POLL_INTERVAL_MS: "5000"
  CRON_ACTIVITY_SYNC: "*/1 * * * *"
  CRON_RECENT_ITEMS_SYNC: "*/1 * * * *"
  CRON_USER_SYNC: "*/1 * * * *"
  CRON_PEOPLE_SYNC: "*/15 * * * *"
  CRON_EMBEDDINGS_SYNC: "*/15 * * * *"
  CRON_GEOLOCATION_SYNC: "*/5 * * * *"
  CRON_FINGERPRINT_SYNC: "0 4 * * *"
  CRON_JOB_CLEANUP: "*/1 * * * *"
  CRON_OLD_JOB_CLEANUP: "0 3 * * *"
  CRON_FULL_SYNC: "0 2 * * *"
  CRON_DELETED_ITEMS_CLEANUP: "0 * * * *"
  SKIP_STARTUP_FULL_SYNC: "false"

---
# ============================================================
# PERSISTENTVOLUMECLAIM - VectorChord (PostgreSQL)
# ============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vectorchord-data
  namespace: media
spec:
  storageClassName: openebs-hostpath
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
# ============================================================
# DEPLOYMENT - VectorChord (PostgreSQL + pgvector)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vectorchord
  namespace: media
  labels:
    app: vectorchord
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vectorchord
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: vectorchord
    spec:
      containers:
        - name: vectorchord
          image: tensorchord/vchord-postgres:pg17-v0.4.1
          args: ["postgres", "-c", "log_checkpoints=off"]
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: streamystats-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: streamystats-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: streamystats-secrets
                  key: POSTGRES_DB
            - name: POSTGRES_HOST_AUTH_METHOD
              value: "scram-sha-256"
            - name: POSTGRES_INITDB_ARGS
              value: "--auth-host=scram-sha-256"
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: vectorchord-data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U $(POSTGRES_USER) -d $(POSTGRES_DB)
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U $(POSTGRES_USER) -d $(POSTGRES_DB)
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
      volumes:
        - name: vectorchord-data
          persistentVolumeClaim:
            claimName: vectorchord-data

---
# ============================================================
# SERVICE - VectorChord
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: vectorchord
  namespace: media
spec:
  selector:
    app: vectorchord
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP

---
# ============================================================
# DEPLOYMENT - Job Server
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-server
  namespace: media
  labels:
    app: job-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: job-server
  template:
    metadata:
      labels:
        app: job-server
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              until nc -z vectorchord 5432; do
                echo "Waiting for vectorchord..."
                sleep 3
              done
              echo "VectorChord is ready!"
      containers:
        - name: job-server
          image: ghcr.io/fredrikburmester/streamystats-job-server:latest
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: streamystats-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: streamystats-config
                  key: PORT
            - name: HOST
              valueFrom:
                configMapKeyRef:
                  name: streamystats-config
                  key: HOST
            - name: SESSION_POLL_INTERVAL_MS
              valueFrom:
                configMapKeyRef:
                  name: streamystats-config
                  key: SESSION_POLL_INTERVAL_MS
            - name: CRON_ACTIVITY_SYNC
              valueFrom:
                configMapKeyRef:
                  name: streamystats-config
                  key: CRON_ACTIVITY_SYNC
            - name: CRON_RECENT_ITEMS_SYNC
              valueFrom:
                configMapKeyRef:
                  name: streamystats-config
                  key: CRON_RECENT_ITEMS_SYNC
            - name: CRON_USER_SYNC
              valueFrom:
                configMapKeyRef:
                  name: streamystats-config
                  key: CRON_USER_SYNC
            - name: CRON_PEOPLE_SYNC
              valueFrom:
                configMapKeyRef:
                  name: streamystats-config
                  key: CRON_PEOPLE_SYNC
            - name: CRON_EMBEDDINGS_SYNC
              valueFrom:
                configMapKeyRef:
                  name: streamystats-config
                  key: CRON_EMBEDDINGS_SYNC
            - name: CRON_GEOLOCATION_SYNC
              valueFrom:
                configMapKeyRef:
                  name: streamystats-config
                  key: CRON_GEOLOCATION_SYNC
            - name: CRON_FINGERPRINT_SYNC
              valueFrom:
                configMapKeyRef:
                  name: streamystats-config
                  key: CRON_FINGERPRINT_SYNC
            - name: CRON_JOB_CLEANUP
              valueFrom:
                configMapKeyRef:
                  name: streamystats-config
                  key: CRON_JOB_CLEANUP
            - name: CRON_OLD_JOB_CLEANUP
              valueFrom:
                configMapKeyRef:
                  name: streamystats-config
                  key: CRON_OLD_JOB_CLEANUP
            - name: CRON_FULL_SYNC
              valueFrom:
                configMapKeyRef:
                  name: streamystats-config
                  key: CRON_FULL_SYNC
            - name: CRON_DELETED_ITEMS_CLEANUP
              valueFrom:
                configMapKeyRef:
                  name: streamystats-config
                  key: CRON_DELETED_ITEMS_CLEANUP
            - name: SKIP_STARTUP_FULL_SYNC
              valueFrom:
                configMapKeyRef:
                  name: streamystats-config
                  key: SKIP_STARTUP_FULL_SYNC
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: streamystats-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: streamystats-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: streamystats-secrets
                  key: POSTGRES_DB
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@vectorchord:5432/$(POSTGRES_DB)"
          ports:
            - containerPort: 3005
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"

---
# ============================================================
# SERVICE - Job Server (ClusterIP interne uniquement)
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: job-server
  namespace: media
spec:
  selector:
    app: job-server
  ports:
    - port: 3005
      targetPort: 3005
  type: ClusterIP

---
# ============================================================
# DEPLOYMENT - NextJS App
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextjs-app
  namespace: media
  labels:
    app: nextjs-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nextjs-app
  template:
    metadata:
      labels:
        app: nextjs-app
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              until nc -z vectorchord 5432; do
                echo "Waiting for vectorchord..."
                sleep 3
              done
              echo "VectorChord is ready!"
      containers:
        - name: nextjs-app
          image: ghcr.io/fredrikburmester/streamystats-nextjs:latest
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: streamystats-config
                  key: NODE_ENV
            - name: HOSTNAME
              valueFrom:
                configMapKeyRef:
                  name: streamystats-config
                  key: HOSTNAME
            - name: JOB_SERVER_URL
              value: "http://job-server:3005"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: streamystats-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: streamystats-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: streamystats-secrets
                  key: POSTGRES_DB
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@vectorchord:5432/$(POSTGRES_DB)"
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: streamystats-secrets
                  key: SESSION_SECRET
            - name: NEXT_SERVER_ACTIONS_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: streamystats-secrets
                  key: NEXT_SERVER_ACTIONS_ENCRYPTION_KEY
          ports:
            - containerPort: 3000
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"

---
# ============================================================
# SERVICE - NextJS App
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: nextjs-app
  namespace: media
spec:
  selector:
    app: nextjs-app
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP

---
# ============================================================
# INGRESSROUTE TRAEFIK - NextJS App (HTTPS)
# ============================================================
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: streamystats-https
  namespace: media
  annotations:
    # traefik.ingress.kubernetes.io/router.entrypoints: websecure
    # traefik.ingress.kubernetes.io/router.tls: "true"
    # traefik.ingress.kubernetes.io/router.middlewares: authelia-forwardauth-authelia@kubernetescrd
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "JellyStats"
    gethomepage.dev/description: "free and open source Statistics App for Jellyfin"
    gethomepage.dev/group: "Media"
    gethomepage.dev/icon: "jellyfin.png"
    gethomepage.dev/pod-selector: "app=nextjs-app"
    #gethomepage.dev/app: "http://nextjs-app:3000"
    gethomepage.dev/href: "https://jellystat.${CLUSTER_DOMAIN}"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`jellystat.${CLUSTER_DOMAIN}`)
      kind: Rule
      services:
        - name: nextjs-app
          port: 3000
  # tls:
  #   certResolver: letsencrypt


