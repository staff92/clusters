# apps/base/poker-tracker/namespace.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: poker-tracker
---
# apps/base/poker-tracker/pvc.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: poker-tracker-data
  namespace: poker-tracker
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: openebs-hostpath 
---
# apps/base/poker-tracker/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: poker-tracker
  namespace: poker-tracker
  labels:
    app: poker-tracker
spec:
  replicas: 1  
  selector:
    matchLabels:
      app: poker-tracker
  template:
    metadata:
      labels:
        app: poker-tracker
    spec:
      containers:
        - name: poker-tracker
          image: ghcr.io/staff92/poker_tracker:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
          volumeMounts:
            - name: data
              mountPath: /app/data  
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: poker-tracker-data
---
# apps/base/poker-tracker/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: poker-tracker
  namespace: poker-tracker
spec:
  selector:
    app: poker-tracker
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
---
# apps/base/poker-tracker/ingress.yaml
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: poker-tracker
  namespace: poker-tracker
spec:
  entryPoints:
    - websecure  
  routes:
    - match: Host(`poker.${CLUSTER_DOMAIN}`)
      kind: Rule
      services:
        - name: poker-tracker
          port: 80